<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsenal Dashboard — 700+ AI Prompts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow"></div>

  <header>
    <div class="brand-text">
      <span class="brand-name">L1A1 CORE</span>
      <span class="brand-sub">Sovereign Intelligence Engine</span>
    </div>

    <div class="header-center">
      <div class="header-title">ARSENAL DASHBOARD</div>
      <div class="header-sub">700+ PROMPTS · EN / DE</div>
    </div>

    <div class="header-right">
      <div class="lang-switch">
        <span id="lang-en" class="active">EN</span>
        <span class="sep">|</span>
        <span id="lang-de">DE</span>
      </div>
      <div class="prompt-count" id="promptCount">0 PROMPTS</div>
    </div>
  </header>

  <nav class="domain-bar">
    <a href="https://core.l1a1.software/" target="_blank" class="domain-link domain-link--featured">core.l1a1.software</a>
    <span class="domain-sep">·</span>
    <a href="https://l1a1.software/" target="_blank" class="domain-link">l1a1.software</a>
    <span class="domain-sep">·</span>
    <a href="https://player.l1a1.software/" target="_blank" class="domain-link">player.l1a1.software</a>
    <span class="domain-sep">·</span>
    <a href="https://l1aora.software/" target="_blank" class="domain-link">l1aora.software</a>
    <span class="domain-sep">·</span>
    <a href="https://l1aora.app/" target="_blank" class="domain-link">l1aora.app</a>
    <span class="domain-sep">·</span>
    <a href="https://liaora.com/" target="_blank" class="domain-link">liaora.com</a>
  </nav>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search in 700+ prompts..." autocomplete="off" spellcheck="false">
  </div>

  <main>
    <aside class="sidebar">
      <h3>Kategorien</h3>
      <ul id="categoryList">
        <li class="active" data-category="all">ALLE</li>
      </ul>
    </aside>
    <section class="content-grid" id="contentGrid"></section>
  </main>

  <footer class="site-footer">
    <span class="footer-role">Architect</span>
    <span class="footer-sep">·</span>
    <span class="footer-name">Arben Hajdini</span>
    <span class="footer-sep">·</span>
    <a href="https://l1a1.software/" target="_blank" class="footer-domain">l1a1.software</a>
  </footer>

  <div id="toast" class="toast">COPIED TO CLIPBOARD</div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
